services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_responder
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Kolkata}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-replace-with-a-long-random-string}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-change-me}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3:8b}
      - SMTP_USER=${SMTP_USER:-your-email@example.com}
      - AUTO_REPLY_EMAIL=${AUTO_REPLY_EMAIL:-your-email@example.com}
      - AUTO_REPLY_SUBJECT_MARKER=${AUTO_REPLY_SUBJECT_MARKER:-AI Auto-Reply:}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ai_responder_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider --proxy=off http://localhost:5678/healthz || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_responder
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3:8b}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/usr/local/bin/ollama-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/ollama-entrypoint.sh"]
    networks:
      - ai_responder_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ollama list | grep -F \"${OLLAMA_MODEL:-llama3:8b}\" >/dev/null 2>&1 || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s

volumes:
  n8n_data:
  ollama_data:

networks:
  ai_responder_net:
    driver: bridge
